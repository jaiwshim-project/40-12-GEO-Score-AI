<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" role="img" aria-label="GEO SCORE AI - Generative Engine Optimization">
  <defs>
    <linearGradient id="geoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="55%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="50%" stop-color="#bae6fd"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <radialGradient id="sphereGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- GE 텍스트 -->
  <g font-family="'Segoe UI Black','Arial Black',Impact,sans-serif" font-weight="900">
    <text x="0" y="48" font-size="48" fill="url(#geoGrad)" letter-spacing="-1">GE</text>
  </g>

  <!-- O 자리에 네트워크 노드 구 -->
  <g transform="translate(108, 24)">
    <circle cx="20" cy="20" r="22" fill="url(#sphereGlow)"/>
    <circle cx="20" cy="20" r="18" fill="none" stroke="url(#nodeGrad)" stroke-width="2.4"/>
    <g stroke="#7dd3fc" stroke-width="1.4" fill="none" opacity="0.9">
      <line x1="6" y1="14" x2="34" y2="26"/>
      <line x1="34" y1="14" x2="6" y2="26"/>
      <line x1="20" y1="4" x2="20" y2="36"/>
    </g>
    <g fill="#60a5fa">
      <circle cx="6" cy="14" r="2.6"/>
      <circle cx="34" cy="14" r="2.6"/>
      <circle cx="6" cy="26" r="2.6"/>
      <circle cx="34" cy="26" r="2.6"/>
      <circle cx="20" cy="4" r="2.6"/>
      <circle cx="20" cy="36" r="2.6"/>
    </g>
    <circle cx="20" cy="20" r="3.4" fill="#22d3ee"/>
    <g transform="translate(34, 2)" fill="#22d3ee">
      <path d="M0 0 L1.6 4 L5.6 4 L2.4 6.4 L3.6 10.4 L0 8 L-3.6 10.4 L-2.4 6.4 L-5.6 4 L-1.6 4 Z"/>
    </g>
  </g>

  <!-- SCORE AI 텍스트 -->
  <g font-family="'Segoe UI Black','Arial Black',Impact,sans-serif" font-weight="900">
    <text x="156" y="48" font-size="44" fill="url(#scoreGrad)" letter-spacing="-0.5">SCORE AI</text>
  </g>

  <!-- 서브 타이틀 -->
  <g>
    <line x1="158" y1="64" x2="178" y2="64" stroke="#60a5fa" stroke-width="1.2" opacity="0.8"/>
    <text x="183" y="68" font-family="'Segoe UI','Arial',sans-serif" font-size="9" font-weight="700" letter-spacing="2.6" fill="#7dd3fc">GENERATIVE ENGINE OPTIMIZATION</text>
    <line x1="343" y1="64" x2="358" y2="64" stroke="#2dd4bf" stroke-width="1.2" opacity="0.8"/>
  </g>
</svg>
