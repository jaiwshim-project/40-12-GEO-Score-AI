<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>분석 중 - GEO Score AI</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🔍%3C/text%3E%3C/svg%3E" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo"><img src="assets/logo.png" alt="GEO Score AI" class="brand-logo brand-logo-nav" /></a>
      <div class="nav-links">
        <a href="index.html#kpi" class="nav-link">10대 KPI</a>
        <a href="index.html#process" class="nav-link">진단 프로세스</a>
        <a href="manual.html" class="nav-link">매뉴얼</a>
        <a href="architecture.html" class="nav-link">아키텍처</a>
        <a href="dashboard.html" class="nav-link">대시보드</a>
        <a href="result-overview.html" class="nav-link">진단 결과</a>
        <a href="cep.html" class="nav-link">🎯 CEP 발굴</a>
        <a href="rewrite.html" class="nav-link">✨ 90점 글</a>
        <a href="derive.html" class="nav-link">🌳 30개 파생</a>
        <a href="citation-test.html" class="nav-link">🔍 인용성 검증</a>
        <a href="chatbot.html" class="nav-link">AI 상담</a>
        <a href="index.html#diag" class="nav-link nav-cta">무료 진단 시작</a>
      </div>
    </div>
  </nav>

  <!-- 분석 중 화면 -->
  <section id="analysisSection" class="section">
    <div class="container">
      <div class="analysis-loader">
        <div class="loader-circle"></div>
        <h2 style="margin-bottom: 16px;">🔍 AI가 귀사(홈페이지, 블로그)를 분석하고 있습니다</h2>
        <p style="color: var(--text-secondary); margin-bottom: 32px;">
          <span id="targetCompany">-</span> · <span id="targetUrl">-</span>
        </p>

        <div class="loader-stages" id="loaderStages">
          <div class="loader-stage active" data-stage="1">
            <div class="stage-icon">🌐</div>
            <div>
              <div style="font-weight: 600;">웹사이트 크롤링</div>
              <div style="font-size: 0.85rem; color: var(--text-tertiary);">URL 데이터 수집 중</div>
            </div>
          </div>
          <div class="loader-stage" data-stage="2">
            <div class="stage-icon">🔍</div>
            <div>
              <div style="font-weight: 600;">콘텐츠 구조 분석</div>
              <div style="font-size: 0.85rem; color: var(--text-tertiary);">메타 + 시맨틱 신호</div>
            </div>
          </div>
          <div class="loader-stage" data-stage="3">
            <div class="stage-icon">🤖</div>
            <div>
              <div style="font-weight: 600;">Gemini AI 진단</div>
              <div style="font-size: 0.85rem; color: var(--text-tertiary);">10대 KPI 점수 산출</div>
            </div>
          </div>
          <div class="loader-stage" data-stage="4">
            <div class="stage-icon">📊</div>
            <div>
              <div style="font-weight: 600;">리포트 생성</div>
              <div style="font-size: 0.85rem; color: var(--text-tertiary);">시각화 + 추천 솔루션</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- 에러 화면 -->
  <section id="errorSection" class="section hidden">
    <div class="container">
      <div style="text-align: center; padding: 80px 0;">
        <div style="font-size: 4rem; margin-bottom: 16px;">😢</div>
        <h2 style="margin-bottom: 16px;">진단 중 오류가 발생했습니다</h2>
        <p id="errorMessage" style="color: var(--text-secondary); margin-bottom: 32px;">-</p>
        <a href="index.html" class="btn btn-primary">처음으로 돌아가기</a>
      </div>
    </div>
  </section>

  <script src="js/kpi-config.js"></script>
  <script src="js/common.js"></script>
  <script src="js/standalone-shim.js"></script>
  <script src="js/analyzing.js"></script>
</body>
</html>
